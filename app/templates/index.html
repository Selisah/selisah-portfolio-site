{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section class="page-section home-page">
    <section class="hero" aria-label="Hero">
        <div class="profile hero-card">
            <div id="profile-picture" class="profile-picture hero-picture">
                <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Profile photo of Selisah">
            </div>
            <h1 class="hero-title">{{ title }}</h1>
        </div>
    </section>

    <section class="quick-links" aria-label="Quick links">
        {% for item in nav_items %}
        {% if item.route != '/' %}
        <a class="quick-link-card" href="{{ item.route }}">
            <h2>{{ item.label }}</h2>
            <p>Go to the {{ item.label | lower }} page.</p>
        </a>
        {% endif %}
        {% endfor %}
    </section>
</section>
{% endblock %}
